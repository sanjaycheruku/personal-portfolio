<!DOCTYPE html>
<html>
  <head>
    <title>Redirecting...</title>
    <script>
      let path = window.location.pathname;
      if (!path.endsWith('/')) {
        path += '/';
      }
      window.location.replace(path + "static/index.html");
    </script>
  </head>
  <body>
    <p>If you are not redirected automatically, <a href="/personal-portfolio/resume-analyzer/static/index.html">click here</a>.</p>
  </body>
</html>
